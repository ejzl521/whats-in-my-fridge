<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#f0fdf4" stroke="#16a34a" stroke-width="3"/>

  <!-- Fridge body -->
  <rect x="28" y="18" width="44" height="64" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="2.5"/>

  <!-- Fridge divider line -->
  <line x1="28" y1="50" x2="72" y2="50" stroke="#16a34a" stroke-width="2"/>

  <!-- Top door handle -->
  <rect x="47" y="28" width="6" height="14" rx="3" fill="#16a34a"/>

  <!-- Bottom door handle -->
  <rect x="47" y="56" width="6" height="14" rx="3" fill="#16a34a"/>

  <!-- Small veggie accents -->
  <circle cx="38" cy="34" r="4" fill="#4ade80"/>
  <circle cx="62" cy="34" r="3" fill="#86efac"/>
  <circle cx="38" cy="65" r="3" fill="#fbbf24"/>
  <circle cx="62" cy="65" r="4" fill="#f97316"/>
</svg>
